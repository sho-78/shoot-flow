/* IndexedDB for local photo storage (saves bandwidth) */
const PhotoStore = {
  _dbPromise: null,
  _openDB() {
    if (this._dbPromise) return this._dbPromise;
    this._dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open('ShootFlowPhotos', 1);
      req.onupgradeneeded = (e) => { e.target.result.createObjectStore('photos'); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this._dbPromise;
  },
  async save(pointId, dataUrl) {
    const db = await this._openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').put(dataUrl, pointId);
      tx.oncomplete = () => resolve();
    });
  },
  async get(pointId) {
    const db = await this._openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('photos', 'readonly');
      const req = tx.objectStore('photos').get(pointId);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  },
  async getMany(pointIds) {
    const db = await this._openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('photos', 'readonly');
      const store = tx.objectStore('photos');
      const results = {};
      let pending = pointIds.length;
      if (pending === 0) return resolve(results);
      for (const id of pointIds) {
        const req = store.get(id);
        req.onsuccess = () => { results[id] = req.result || null; if (--pending === 0) resolve(results); };
        req.onerror = () => { results[id] = null; if (--pending === 0) resolve(results); };
      }
    });
  },
  async delete(pointId) {
    const db = await this._openDB();
    return new Promise((resolve) => {
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').delete(pointId);
      tx.oncomplete = () => resolve();
    });
  }
};

/* Supabase Data Layer */
const db = {
  async getUsers() {
    const { data } = await supabase.from('app_users').select('*').order('created_at');
    return (data || []).map(u => ({ id: u.id, username: u.username, password: u.password, displayName: u.display_name, role: u.role, createdAt: u.created_at }));
  },
  async addUser(user) {
    const { error } = await supabase.from('app_users').insert({ id: user.id, username: user.username, password: user.password, display_name: user.displayName, role: user.role });
    return !error;
  },
  async updateUser(id, updates) {
    const mapped = {};
    if (updates.displayName !== undefined) mapped.display_name = updates.displayName;
    if (updates.password !== undefined) mapped.password = updates.password;
    if (updates.role !== undefined) mapped.role = updates.role;
    await supabase.from('app_users').update(mapped).eq('id', id);
  },
  async deleteUser(id) {
    await supabase.from('app_users').delete().eq('id', id);
  },
  async getFlows() {
    const { data: flows } = await supabase.from('flows').select('*').order('created_at', { ascending: false });
    if (!flows) return [];
    const result = [];
    for (const f of flows) {
      const { data: points } = await supabase.from('shoot_points').select('*').eq('flow_id', f.id).order('sort_order');
      const pointIds = (points || []).map(p => p.id);
      const localPhotos = await PhotoStore.getMany(pointIds);
      result.push({
        id: f.id, name: f.name, propertyType: f.property_type, createdAt: f.created_at, createdBy: f.created_by || '',

          id: p.id, name: p.name, category: p.category, required: p.required, status: p.status,
          photoDataUrl: localPhotos[p.id] || null, sampleImageUrl: p.sample_image_url, note: p.note || '',
          shotBy: p.shot_by || '', timestamp: p.timestamp
        }))
      });
    }
    return result;
  },
  async saveFlow(flow) {
    await supabase.from('flows').upsert({ id: flow.id, name: flow.name, property_type: flow.propertyType, created_at: flow.createdAt, created_by: flow.createdBy });
    await supabase.from('shoot_points').delete().eq('flow_id', flow.id);
    if (flow.points && flow.points.length > 0) {
      const rows = flow.points.map((p, i) => ({
        id: p.id, flow_id: flow.id, name: p.name, category: p.category, required: p.required,
        status: p.status, photo_data_url: null, sample_image_url: p.sampleImageUrl,
        note: p.note, shot_by: p.shotBy, timestamp: p.timestamp, sort_order: i
      }));
      await supabase.from('shoot_points').insert(rows);
      // Save photos locally
      for (const p of flow.points) {
        if (p.photoDataUrl) await PhotoStore.save(p.id, p.photoDataUrl);
      }
    }
  },
  async deleteFlow(id) {
    const { data: points } = await supabase.from('shoot_points').select('id').eq('flow_id', id);
    if (points) { for (const p of points) await PhotoStore.delete(p.id); }
    await supabase.from('shoot_points').delete().eq('flow_id', id);
    await supabase.from('flows').delete().eq('id', id);
  }
};

/* ══════════════════════════════════════════
   Auth Store (in-memory, React state)
   ══════════════════════════════════════════ */
function _BaseAuthStore() {
  const [users, setUsers] = useState([DEFAULT_ADMIN]);
  const [currentUser, setCurrentUser] = useState(null);

  const login = (username, password) => {
    const user = users.find((u) => u.username === username && u.password === password);
    if (user) { setCurrentUser(user); return { success: true }; }
    return { success: false, error: "ユーザー名またはパスワードが違います" };
  };

  const logout = () => setCurrentUser(null);

  const addUser = (userData) => {
    if (users.find((u) => u.username === userData.username)) return { success: false, error: "このユーザー名は既に使用されています" };
    const newUser = { id: uid(), ...userData, createdAt: new Date().toISOString() };
    setUsers((prev) => [...prev, newUser]);
    return { success: true, user: newUser };
  };

  const updateUser = (id, updates) => {
    setUsers((prev) => prev.map((u) => (u.id === id ? { ...u, ...updates } : u)));
    if (currentUser?.id === id) setCurrentUser((prev) => ({ ...prev, ...updates }));
  };

  const deleteUser = (id) => {
    if (id === "admin") return { success: false, error: "デフォルト管理者は削除できません" };
    setUsers((prev) => prev.filter((u) => u.id !== id));
    return { success: true };
  };

  const isAdmin = currentUser?.role === "admin";

  return { users, currentUser, login, logout, addUser, updateUser, deleteUser, isAdmin };
}

/* ══════════════════════════════════════════
   Share Utilities
   ══════════════════════════════════════════ */
async function dataUrlToFile(dataUrl, filename) {
  const res = await fetch(dataUrl); const blob = await res.blob();
  return new File([blob], filename, { type: blob.type });
}
async function shareBatchPhotos(photos, title) {
  const files = await Promise.all(photos.map((p) => dataUrlToFile(p.dataUrl, `${p.name.replace(/[\/\\:*?"<>|]/g, "_")}.jpg`)));
  if (navigator.share && navigator.canShare && navigator.canShare({ files })) {
    try { await navigator.share({ title, text: `${title}（${files.length}枚）`, files }); return "shared"; }
    catch (e) { if (e.name === "AbortError") return "cancelled"; }
  }
  for (const f of files) { const u = URL.createObjectURL(f); const a = document.createElement("a"); a.href = u; a.download = f.name; a.click(); URL.revokeObjectURL(u); }
  return "downloaded";
}

function Toast({ message, type, onDone }) {

  return <div style={{ position: "fixed", bottom: "80px", left: "50%", transform: "translateX(-50%)", background: type === "success" ? "#27AE60" : type === "info" ? "#3B8BEB" : "#E74C3C", color: "#fff", padding: "10px 20px", borderRadius: "10px", fontSize: "13px", fontWeight: 600, zIndex: 9999, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", animation: "toastIn 0.3s ease", maxWidth: "90%", textAlign: "center" }}>{message}</div>;
}

function PropertyShootApp() {
  const auth = useAuthStore();
  const [mode, setMode] = useState("login"); // login | home | admin | shoot | settings | users
  const [flows, setFlows] = useState([]);
  const [activeFlowId, setActiveFlowId] = useState(null);
  const [toast, setToast] = useState(null);
  const activeFlow = flows.find((f) => f.id === activeFlowId);
  const showToast = (msg, type = "success") => setToast({ message: msg, type, key: Date.now() });

  const createFlow = (name, presetKey) => {
    const preset = PROPERTY_PRESETS[presetKey];
    const nf = { id: uid(), name, propertyType: presetKey, createdAt: new Date().toISOString(), createdBy: auth.currentUser?.displayName || "",
      points: preset.points.map((p) => ({ id: uid(), ...p, status: "pending", photoDataUrl: null, sampleImageUrl: null, note: "", timestamp: null, shotBy: "" })) };
    setFlows((prev) => [...prev, nf]); setActiveFlowId(nf.id); setMode("admin");
  };
  const updateFlow = (u) => setFlows((prev) => prev.map((f) => (f.id === u.id ? u : f)));
  const deleteFlow = (id) => { setFlows((prev) => prev.filter((f) => f.id !== id)); if (activeFlowId === id) { setActiveFlowId(null); setMode("home"); } };

  const handleLogout = () => { auth.logout(); setMode("login"); };

  // Not logged in
  if (!auth.currentUser) return <><LoginScreen auth={auth} onSuccess={() => setMode("home")} />{toast && <Toast {...toast} onDone={() => setToast(null)} />}</>;

  const content = (() => {
    if (mode === "settings") return <SettingsScreen auth={auth} onBack={() => setMode("home")} onLogout={handleLogout} showToast={showToast} onNavigateUsers={() => setMode("users")} />;
    if (mode === "users" && auth.isAdmin) return <UserManagement auth={auth} onBack={() => setMode("settings")} showToast={showToast} />;
    if (mode === "shoot" && activeFlow) return <ShootMode flow={activeFlow} onUpdate={updateFlow} onBack={() => setMode("admin")} showToast={showToast} currentUser={auth.currentUser} />;
    if (mode === "admin" && activeFlow) return <AdminMode flow={activeFlow} onUpdate={updateFlow} onStartShoot={() => setMode("shoot")} onBack={() => { setActiveFlowId(null); setMode("home"); }} onDelete={() => deleteFlow(activeFlow.id)} showToast={showToast} isAdmin={auth.isAdmin} />;
    return <HomeScreen flows={flows} onCreateFlow={createFlow} onSelectFlow={(id) => { setActiveFlowId(id); setMode("admin"); }} auth={auth} onSettings={() => setMode("settings")} />;
  })();

  return <>{content}{toast && <Toast {...toast} onDone={() => setToast(null)} />}</>;
}

/* ══════════════════════════════════════════
   USER MANAGEMENT (Admin only)
   ══════════════════════════════════════════ */
function UserManagement({ auth, onBack, showToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newUsername, setNewUsername] = useState("");
  const [newDisplayName, setNewDisplayName] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [newRole, setNewRole] = useState("shooter");
  const [editingId, setEditingId] = useState(null);
  const [editRole, setEditRole] = useState("");

  const handleAddUser = () => {
    if (!newUsername.trim() || !newDisplayName.trim() || !newPassword.trim()) { showToast("全ての項目を入力してください", "error"); return; }
    if (newPassword.length < 4) { showToast("パスワードは4文字以上にしてください", "error"); return; }
    const result = auth.addUser({ username: newUsername.trim(), displayName: newDisplayName.trim(), password: newPassword, role: newRole });
    if (result.success) { showToast(`${newDisplayName.trim()} を登録しました`); setNewUsername(""); setNewDisplayName(""); setNewPassword(""); setNewRole("shooter"); setShowAdd(false); }
    else showToast(result.error, "error");
  };

  const handleDelete = (user) => {
    const result = auth.deleteUser(user.id);
    if (result.success) showToast(`${user.displayName} を削除しました`);
    else showToast(result.error, "error");
  };

  const handleRoleChange = (userId) => {
    auth.updateUser(userId, { role: editRole });
    setEditingId(null);
    showToast("権限を変更しました");
  };

  return (
    <Shell>
      <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--bdr)", background: "var(--card)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <button onClick={onBack} style={backBtnStyle}>←</button>
          <h2 style={{ margin: 0, fontSize: "17px", fontWeight: 800, color: "var(--t1)" }}>ユーザー管理</h2>
          <span style={{ marginLeft: "auto", fontSize: "12px", color: "var(--t3)" }}>{auth.users.length}名</span>
        </div>
      </div>

      <div style={{ padding: "16px 20px 100px" }}>
        {/* User list */}
        {auth.users.map((user) => (
          <div key={user.id} style={{ background: "var(--card)", border: "1.5px solid var(--bdr)", borderRadius: "12px", padding: "14px 16px", marginBottom: "8px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{ width: "40px", height: "40px", borderRadius: "50%", background: user.role === "admin" ? "linear-gradient(135deg, #E74C3C, #C0392B)" : "linear-gradient(135deg, var(--accent), #2D7DD2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px", color: "#fff", fontWeight: 800, flexShrink: 0 }}>
                {user.displayName.charAt(0)}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: "14px", fontWeight: 700, color: "var(--t1)" }}>{user.displayName}</div>
                <div style={{ fontSize: "11px", color: "var(--t3)" }}>@{user.username} · {user.role === "admin" ? "管理者" : "撮影担当"}</div>
              </div>
              {user.id !== "admin" && (
                <div style={{ display: "flex", gap: "4px" }}>
                  <button onClick={() => { setEditingId(editingId === user.id ? null : user.id); setEditRole(user.role); }} style={{ ...tinyBtnStyle, width: "28px", height: "28px" }}>✎</button>
                  <button onClick={() => handleDelete(user)} style={{ ...tinyBtnStyle, width: "28px", height: "28px", color: "#E74C3C" }}>×</button>
                </div>
              )}
              {user.id === "admin" && (
                <span style={{ fontSize: "10px", color: "var(--t3)", background: "var(--bdr)", padding: "2px 8px", borderRadius: "4px" }}>既定</span>
              )}
            </div>

            {/* Role edit */}
            {editingId === user.id && (
              <div style={{ marginTop: "12px", paddingTop: "12px", borderTop: "1px solid var(--bdr)" }}>
                <label style={{ fontSize: "12px", fontWeight: 600, color: "var(--t3)", marginBottom: "6px", display: "block" }}>権限</label>
                <div style={{ display: "flex", gap: "8px", marginBottom: "10px" }}>
                  {[{ val: "admin", label: "管理者", desc: "フロー作成・ユーザー管理" }, { val: "shooter", label: "撮影担当", desc: "撮影のみ" }].map((r) => (
                    <button key={r.val} onClick={() => setEditRole(r.val)}
                      style={{ flex: 1, padding: "10px", background: editRole === r.val ? (r.val === "admin" ? "#E74C3C22" : "var(--accent)22") : "var(--bg)", border: `1.5px solid ${editRole === r.val ? (r.val === "admin" ? "#E74C3C" : "var(--accent)") : "var(--bdr)"}`, borderRadius: "8px", cursor: "pointer", fontSize: "12px", fontWeight: 600, color: editRole === r.val ? (r.val === "admin" ? "#E74C3C" : "var(--accent)") : "var(--t3)", fontFamily: "inherit", textAlign: "center" }}>
                      <div>{r.label}</div>
                      <div style={{ fontSize: "10px", fontWeight: 400, marginTop: "2px" }}>{r.desc}</div>
                    </button>
                  ))}
                </div>
                <button onClick={() => handleRoleChange(user.id)} style={{ ...primaryBtnStyle, padding: "10px", fontSize: "13px" }}>権限を変更</button>
              </div>
            )}
          </div>
        ))}

        {/* Add user */}
        {!showAdd ? (
          <button onClick={() => setShowAdd(true)} style={{ width: "100%", padding: "14px", background: "var(--card)", border: "2px dashed var(--bdr)", borderRadius: "12px", cursor: "pointer", color: "var(--t3)", fontSize: "13px", fontWeight: 600, fontFamily: "inherit", marginTop: "8px" }}>
            ＋ ユーザーを追加
          </button>
        ) : (
          <div style={{ background: "var(--card)", border: "1.5px solid var(--accent)", borderRadius: "14px", padding: "20px", marginTop: "8px" }}>
            <h3 style={{ margin: "0 0 14px", fontSize: "15px", fontWeight: 700, color: "var(--t1)" }}>新規ユーザー登録</h3>
            <input value={newDisplayName} onChange={(e) => setNewDisplayName(e.target.value)} placeholder="表示名（例: 田中太郎）" style={{ ...inputStyle, marginBottom: "8px" }} />
            <input value={newUsername} onChange={(e) => setNewUsername(e.target.value)} placeholder="ユーザー名（ログインID）" style={{ ...inputStyle, marginBottom: "8px" }} />
            <input value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="パスワード（4文字以上）" type="password" style={{ ...inputStyle, marginBottom: "10px" }} />
            <label style={{ fontSize: "12px", fontWeight: 600, color: "var(--t3)", marginBottom: "6px", display: "block" }}>権限</label>
            <div style={{ display: "flex", gap: "8px", marginBottom: "14px" }}>
              {[{ val: "admin", label: "🔑 管理者" }, { val: "shooter", label: "📸 撮影担当" }].map((r) => (
                <button key={r.val} onClick={() => setNewRole(r.val)}
                  style={{ flex: 1, padding: "10px", background: newRole === r.val ? (r.val === "admin" ? "#E74C3C22" : "var(--accent)22") : "var(--bg)", border: `1.5px solid ${newRole === r.val ? (r.val === "admin" ? "#E74C3C" : "var(--accent)") : "var(--bdr)"}`, borderRadius: "8px", cursor: "pointer", fontSize: "13px", fontWeight: 600, color: newRole === r.val ? (r.val === "admin" ? "#E74C3C" : "var(--accent)") : "var(--t3)", fontFamily: "inherit" }}>
                  {r.label}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={() => { setShowAdd(false); setNewUsername(""); setNewDisplayName(""); setNewPassword(""); }} style={secondaryBtnStyle}>キャンセル</button>
              <button onClick={handleAddUser} style={primaryBtnStyle}>登録</button>
            </div>
          </div>
        )}
      </div>
    </Shell>
  );
}

/* ══════════════════════════════════════════
   ADMIN MODE
   ══════════════════════════════════════════ */
function AdminMode({ flow, onUpdate, onStartShoot, onBack, onDelete, showToast, isAdmin }) {
  const [addingPoint, setAddingPoint] = useState(false);
  const [npName, setNpName] = useState(""); const [npCat, setNpCat] = useState("interior"); const [npReq, setNpReq] = useState(true);
  const [sharing, setSharing] = useState(false);

  const done = flow.points.filter((p) => p.status === "done").length, total = flow.points.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const shotPhotos = flow.points.filter((p) => p.status === "done" && p.photoDataUrl);

  const grouped = {};
  flow.points.forEach((p, i) => { if (!grouped[p.category]) grouped[p.category] = []; grouped[p.category].push({ ...p, originalIndex: i }); });

  const updatePoint = (id, u) => onUpdate({ ...flow, points: flow.points.map((p) => (p.id === id ? { ...p, ...u } : p)) });
  const removePoint = (id) => onUpdate({ ...flow, points: flow.points.filter((p) => p.id !== id) });
  const addPoint = () => { if (!npName.trim()) return; onUpdate({ ...flow, points: [...flow.points, { id: uid(), name: npName.trim(), category: npCat, required: npReq, status: "pending", photoDataUrl: null, sampleImageUrl: null, note: "", timestamp: null, shotBy: "" }] }); setNpName(""); setAddingPoint(false); };
  const resetAll = () => onUpdate({ ...flow, points: flow.points.map((p) => ({ ...p, status: "pending", photoDataUrl: null, note: "", timestamp: null, shotBy: "" })) });
  const movePoint = (i, d) => { const pts = [...flow.points]; const t = i + d; if (t < 0 || t >= pts.length) return; [pts[i], pts[t]] = [pts[t], pts[i]]; onUpdate({ ...flow, points: pts }); };

  const handleBatchShare = async () => {
    if (shotPhotos.length === 0) return; setSharing(true);
    const r = await shareBatchPhotos(shotPhotos.map((p) => ({ dataUrl: p.photoDataUrl, name: `${flow.name}_${p.name}` })), flow.name);
    setSharing(false);
    if (r === "shared") showToast("共有シートを開きました", "success");
    else if (r === "downloaded") showToast(`${shotPhotos.length}枚をダウンロードしました`, "info");
  };

  return (
    <Shell>
      <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--bdr)", background: "var(--card)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
          <button onClick={onBack} style={backBtnStyle}>←</button>
          <div style={{ flex: 1 }}>
            <h2 style={{ margin: 0, fontSize: "17px", fontWeight: 800, color: "var(--t1)" }}>{flow.name}</h2>
            <p style={{ margin: "2px 0 0", fontSize: "11px", color: "var(--t3)" }}>{PROPERTY_PRESETS[flow.propertyType]?.icon} {PROPERTY_PRESETS[flow.propertyType]?.name} · {total}箇所</p>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          <div style={{ flex: 1, height: "6px", background: "var(--bdr)", borderRadius: "3px", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: pct === 100 ? "#27AE60" : "var(--accent)", borderRadius: "3px", transition: "width 0.4s" }} />
          </div>
          <span style={{ fontSize: "13px", fontWeight: 700, color: pct === 100 ? "#27AE60" : "var(--accent)", minWidth: "60px", textAlign: "right" }}>{done}/{total}</span>
        </div>
        <div style={{ display: "flex", gap: "8px", marginTop: "12px" }}>
          <button onClick={onStartShoot} style={{ ...primaryBtnStyle, fontSize: "14px", padding: "12px" }}>📸 撮影開始</button>
          {isAdmin && <button onClick={resetAll} style={{ ...secondaryBtnStyle, fontSize: "12px", padding: "10px 14px" }}>🔄</button>}
          {isAdmin && <button onClick={onDelete} style={{ ...secondaryBtnStyle, fontSize: "12px", padding: "10px 14px", color: "#E74C3C" }}>🗑</button>}
        </div>
        {!isAdmin && (
          <div style={{ marginTop: "10px", padding: "8px 12px", background: "var(--accent)11", border: "1px solid var(--accent)33", borderRadius: "8px", display: "flex", alignItems: "center", gap: "6px" }}>
            <span style={{ fontSize: "13px" }}>🔒</span>
            <span style={{ fontSize: "11px", color: "var(--accent)", fontWeight: 600 }}>閲覧モード — 編集は管理者のみ可能です</span>
          </div>
        )}
        {shotPhotos.length > 0 && (
          <>
            <button onClick={handleBatchShare} disabled={sharing} style={shareAllBtnStyle}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
              {sharing ? "準備中..." : `撮影済み ${shotPhotos.length}枚を一括共有`}
            </button>
            <p style={{ margin: "6px 0 0", fontSize: "10px", color: "var(--t3)", textAlign: "center" }}>スマホ → 共有シートから LINE を選択</p>
          </>
        )}
      </div>

      <div style={{ padding: "16px 20px 100px" }}>
        {Object.entries(CATEGORIES).map(([ck, ci]) => {
          const pts = grouped[ck]; if (!pts || pts.length === 0) return null;
          return (
            <div key={ck} style={{ marginBottom: "20px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "10px" }}>
                <span style={{ fontSize: "16px" }}>{ci.icon}</span>
                <h3 style={{ margin: 0, fontSize: "13px", fontWeight: 700, color: ci.color, letterSpacing: "0.5px" }}>{ci.label}</h3>
                <span style={{ fontSize: "11px", color: "var(--t3)", marginLeft: "4px" }}>({pts.filter((p) => p.status === "done").length}/{pts.length})</span>
              </div>
              {pts.map((p) => <PointRow key={p.id} point={p} catColor={ci.color}
                onToggle={isAdmin ? () => updatePoint(p.id, { status: p.status === "done" ? "pending" : "done" }) : null}
                onRemove={isAdmin ? () => removePoint(p.id) : null}
                onMoveUp={isAdmin ? () => movePoint(p.originalIndex, -1) : null}
                onMoveDown={isAdmin ? () => movePoint(p.originalIndex, 1) : null}
                onSampleUpload={isAdmin ? (dataUrl) => updatePoint(p.id, { sampleImageUrl: dataUrl }) : null}
                isAdmin={isAdmin} />)}
            </div>
          );
        })}
        {isAdmin && (!addingPoint ? (
          <button onClick={() => setAddingPoint(true)} style={{ width: "100%", padding: "14px", background: "var(--card)", border: "2px dashed var(--bdr)", borderRadius: "12px", cursor: "pointer", color: "var(--t3)", fontSize: "13px", fontWeight: 600, fontFamily: "inherit" }}>＋ 撮影箇所を追加</button>
        ) : (
          <div style={{ background: "var(--card)", border: "1.5px solid var(--bdr)", borderRadius: "12px", padding: "16px" }}>
            <input autoFocus value={npName} onChange={(e) => setNpName(e.target.value)} placeholder="撮影箇所名" style={inputStyle} />
            <div style={{ display: "flex", gap: "6px", margin: "10px 0", flexWrap: "wrap" }}>
              {Object.entries(CATEGORIES).map(([k, v]) => (
                <button key={k} onClick={() => setNpCat(k)} style={{ padding: "6px 12px", borderRadius: "8px", border: `1.5px solid ${npCat === k ? v.color : "var(--bdr)"}`, background: npCat === k ? `${v.color}22` : "transparent", color: npCat === k ? v.color : "var(--t3)", fontSize: "12px", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{v.icon} {v.label}</button>
              ))}
            </div>
            <label style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: "var(--t2)", marginBottom: "12px", cursor: "pointer" }}><input type="checkbox" checked={npReq} onChange={(e) => setNpReq(e.target.checked)} />必須</label>
            <div style={{ display: "flex", gap: "8px" }}>
              <button onClick={() => setAddingPoint(false)} style={secondaryBtnStyle}>キャンセル</button>
              <button onClick={addPoint} disabled={!npName.trim()} style={{ ...primaryBtnStyle, opacity: npName.trim() ? 1 : 0.4 }}>追加</button>
            </div>
          </div>
        ))}
      </div>
    </Shell>
  );
}

/* ══════════════════════════════════════════
   PointRow (with sample upload for admin)
   ══════════════════════════════════════════ */
function PointRow({ point, catColor, onToggle, onRemove, onMoveUp, onMoveDown, isAdmin, onSampleUpload }) {
  const isDone = point.status === "done";
  const fileRef = useRef(null);
  const handleFile = (e) => { const f = e.target.files?.[0]; if (!f || !onSampleUpload) return; const r = new FileReader(); r.onload = (ev) => onSampleUpload(ev.target.result); r.readAsDataURL(f); e.target.value = ""; };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "10px 12px", background: isDone ? `${catColor}08` : "var(--card)", border: `1.5px solid ${isDone ? `${catColor}33` : "var(--bdr)"}`, borderRadius: "10px", marginBottom: "6px" }}>
      <button onClick={onToggle || undefined} disabled={!onToggle} style={{ width: "26px", height: "26px", borderRadius: "8px", border: `2px solid ${isDone ? catColor : "var(--bdr)"}`, background: isDone ? catColor : "transparent", cursor: onToggle ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: "14px", flexShrink: 0, opacity: onToggle ? 1 : 0.7 }}>{isDone && "✓"}</button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: "13px", fontWeight: 600, color: isDone ? "var(--t3)" : "var(--t1)", textDecoration: isDone ? "line-through" : "none" }}>
          {point.name}{point.required && <span style={{ color: "#E74C3C", marginLeft: "4px", fontSize: "10px" }}>必須</span>}
        </div>
        {point.timestamp && <div style={{ fontSize: "10px", color: "var(--t3)", marginTop: "2px" }}>{point.shotBy && `${point.shotBy} · `}{new Date(point.timestamp).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })}</div>}
      </div>
      {isAdmin && point.sampleImageUrl && (
        <div onClick={() => fileRef.current?.click()} style={{ width: "32px", height: "32px", borderRadius: "6px", overflow: "hidden", border: "2px solid #9B59B6", flexShrink: 0, cursor: "pointer", position: "relative" }}>
          <img src={point.sampleImageUrl} alt="s" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "#9B59B6", color: "#fff", fontSize: "7px", textAlign: "center", fontWeight: 700, lineHeight: "10px" }}>見本</div>
        </div>
      )}
      {point.photoDataUrl && (
        <div style={{ width: "32px", height: "32px", borderRadius: "6px", overflow: "hidden", border: `1px solid ${catColor}44`, flexShrink: 0 }}><img src={point.photoDataUrl} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div>
      )}
      {isAdmin && !point.sampleImageUrl && onSampleUpload && (
        <button onClick={() => fileRef.current?.click()} style={{ ...tinyBtnStyle, fontSize: "10px", color: "#9B59B6", border: "1px solid #9B59B644" }} title="見本追加">🖼</button>
      )}
      {onSampleUpload && <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile} />}
      {isAdmin && onRemove && <div style={{ display: "flex", gap: "2px", flexShrink: 0 }}>
        <button onClick={onMoveUp} style={tinyBtnStyle}>↑</button><button onClick={onMoveDown} style={tinyBtnStyle}>↓</button><button onClick={onRemove} style={{ ...tinyBtnStyle, color: "#E74C3C" }}>×</button>
      </div>}
    </div>
  );
}

/* ══════════════════════════════════════════
   SHOOT MODE
   ══════════════════════════════════════════ */
function ShootMode({ flow, onUpdate, onBack, showToast, currentUser }) {
  const [currentIndex, setCurrentIndex] = useState(() => { const f = flow.points.findIndex((p) => p.status === "pending"); return f >= 0 ? f : 0; });
  const [cameraActive, setCameraActive] = useState(false);
  const [capturedPhoto, setCapturedPhoto] = useState(null);
  const [showList, setShowList] = useState(false);
  const [showComplete, setShowComplete] = useState(false);
  const [sharing, setSharing] = useState(false);
  const [sampleZoom, setSampleZoom] = useState(false);
  const videoRef = useRef(null); const streamRef = useRef(null); const canvasRef = useRef(null);

  const current = flow.points[currentIndex];
  const done = flow.points.filter((p) => p.status === "done").length, total = flow.points.length;
  const catInfo = CATEGORIES[current?.category] || CATEGORIES.interior;

  const startCamera = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } });
      streamRef.current = s;
      setCameraActive(true);
    } catch(e) { alert("カメラへのアクセスを許可してください: " + e.message); }
  };

  // Attach stream to video element after DOM renders, with explicit play()
  useEffect(() => {
    if (cameraActive && streamRef.current && videoRef.current) {
      const video = videoRef.current;
      video.srcObject = streamRef.current;
      video.setAttribute('autoplay', '');
      video.setAttribute('playsinline', '');
      video.setAttribute('muted', '');
      video.muted = true;
      video.play().catch(() => {});
    }
  }, [cameraActive]);
  const stopCamera = () => { if (streamRef.current) { streamRef.current.getTracks().forEach((t) => t.stop()); streamRef.current = null; } setCameraActive(false); };
  const capturePhoto = () => { if (!videoRef.current || !canvasRef.current) return; const v = videoRef.current, c = canvasRef.current; c.width = v.videoWidth; c.height = v.videoHeight; c.getContext("2d").drawImage(v, 0, 0); setCapturedPhoto(c.toDataURL("image/jpeg", 0.85)); stopCamera(); };
  const confirmPhoto = () => {
    const updated = { ...flow, points: flow.points.map((p, i) => i === currentIndex ? { ...p, status: "done", photoDataUrl: capturedPhoto, timestamp: new Date().toISOString(), shotBy: currentUser?.displayName || "" } : p) };
    onUpdate(updated); setCapturedPhoto(null);
    if (updated.points.filter((p) => p.status === "pending").length === 0) { setShowComplete(true); return; }
    const next = updated.points.findIndex((p, i) => i > currentIndex && p.status === "pending");
    if (next >= 0) setCurrentIndex(next);
  };
  const handleBatchShare = async () => {
    const ps = flow.points.filter((p) => p.status === "done" && p.photoDataUrl); if (!ps.length) return; setSharing(true);
    const r = await shareBatchPhotos(ps.map((p) => ({ dataUrl: p.photoDataUrl, name: `${flow.name}_${p.name}` })), flow.name);
    setSharing(false);
    if (r === "shared") showToast("共有シートを開きました", "success"); else if (r === "downloaded") showToast(`${ps.length}枚をダウンロードしました`, "info");
  };
  useEffect(() => () => stopCamera(), []);

  if (showComplete) {
    const sc = flow.points.filter((p) => p.status === "done" && p.photoDataUrl).length;
    return (
      <Shell><div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center" }}>
        <div style={{ fontSize: "64px", marginBottom: "16px" }}>🎉</div>
        <h2 style={{ margin: "0 0 8px", fontSize: "22px", fontWeight: 800, color: "var(--t1)" }}>全箇所 撮影完了！</h2>
        <p style={{ margin: "0 0 8px", fontSize: "14px", color: "var(--t2)" }}>{flow.name}</p>
        <p style={{ margin: "0 0 32px", fontSize: "28px", fontWeight: 800, color: "#27AE60" }}>{sc}枚</p>
        <button onClick={handleBatchShare} disabled={sharing} style={{ ...shareAllBtnStyle, maxWidth: "320px", padding: "16px", fontSize: "16px", fontWeight: 800, marginBottom: "8px" }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          {sharing ? "準備中..." : "LINEで一括共有"}
        </button>
        <p style={{ margin: "0 0 28px", fontSize: "11px", color: "var(--t3)" }}>共有シートから LINE を選択</p>
        <button onClick={() => { setShowComplete(false); onBack(); }} style={{ ...secondaryBtnStyle, padding: "12px 32px" }}>戻る</button>
      </div></Shell>
    );
  }

  if (showList) {
    return (
      <Shell>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--bdr)", background: "var(--card)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
            <button onClick={() => setShowList(false)} style={backBtnStyle}>←</button>
            <h2 style={{ margin: 0, fontSize: "16px", fontWeight: 700, color: "var(--t1)" }}>チェックリスト</h2>
            <span style={{ marginLeft: "auto", fontSize: "13px", fontWeight: 700, color: "var(--accent)" }}>{done}/{total}</span>
          </div>
        </div>
        <div style={{ padding: "16px 20px 100px" }}>
          {flow.points.map((p, i) => (
            <div key={p.id} onClick={() => { setCurrentIndex(i); setShowList(false); }} style={{ cursor: "pointer" }}>
              <PointRow point={p} catColor={CATEGORIES[p.category].color} onToggle={() => {}} />
            </div>
          ))}
        </div>
      </Shell>
    );
  }

  return (
    <Shell>
      <canvas ref={canvasRef} style={{ display: "none" }} />
      <div style={{ padding: "12px 16px", background: "var(--card)", borderBottom: "1px solid var(--bdr)", display: "flex", alignItems: "center", gap: "10px" }}>
        <button onClick={() => { stopCamera(); onBack(); }} style={backBtnStyle}>←</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: "11px", color: "var(--t3)", fontWeight: 600 }}>{currentIndex + 1}/{total} · {catInfo.icon} {catInfo.label}</div>
          <div style={{ fontSize: "16px", fontWeight: 800, color: "var(--t1)", marginTop: "1px" }}>{current?.name}{current?.required && <span style={{ color: "#E74C3C", fontSize: "10px", marginLeft: "6px" }}>必須</span>}</div>
        </div>
        <button onClick={() => setShowList(true)} style={{ ...secondaryBtnStyle, padding: "8px 12px", fontSize: "12px" }}>📋 {done}/{total}</button>
      </div>
      <div style={{ display: "flex", gap: "3px", padding: "8px 16px", overflowX: "auto", background: "var(--bg)" }}>
        {flow.points.map((p, i) => (<div key={p.id} onClick={() => setCurrentIndex(i)} style={{ flex: "1 0 0", height: "4px", borderRadius: "2px", background: p.status === "done" ? "#27AE60" : i === currentIndex ? "var(--accent)" : "var(--bdr)", cursor: "pointer", minWidth: "8px" }} />))}
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "16px", minHeight: "50vh" }}>
        {capturedPhoto ? (
          <div style={{ width: "100%", maxWidth: "500px" }}>
            {current?.sampleImageUrl && (
              <div style={{ display: "flex", gap: "8px", marginBottom: "12px" }}>
                <div style={{ flex: 1, borderRadius: "10px", overflow: "hidden", border: "2px solid #9B59B6", position: "relative" }}>
                  <img src={current.sampleImageUrl} alt="s" style={{ width: "100%", display: "block", aspectRatio: "4/3", objectFit: "cover" }} />
                  <div style={{ position: "absolute", bottom: "4px", left: "4px", background: "#9B59B6", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "9px", fontWeight: 700 }}>見本</div>
                </div>
                <div style={{ flex: 1, borderRadius: "10px", overflow: "hidden", border: "2px solid var(--accent)", position: "relative" }}>
                  <img src={capturedPhoto} alt="c" style={{ width: "100%", display: "block", aspectRatio: "4/3", objectFit: "cover" }} />
                  <div style={{ position: "absolute", bottom: "4px", left: "4px", background: "var(--accent)", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "9px", fontWeight: 700 }}>撮影</div>
                </div>
              </div>
            )}
            {!current?.sampleImageUrl && (
              <div style={{ borderRadius: "16px", overflow: "hidden", border: "2px solid var(--bdr)", marginBottom: "16px", position: "relative" }}>
                <img src={capturedPhoto} alt="" style={{ width: "100%", display: "block" }} />
                <div style={{ position: "absolute", top: "12px", left: "12px", background: "rgba(0,0,0,0.7)", color: "#fff", padding: "4px 10px", borderRadius: "6px", fontSize: "12px", fontWeight: 600 }}>{current?.name}</div>
              </div>
            )}
            <div style={{ display: "flex", gap: "10px" }}>
              <button onClick={() => { setCapturedPhoto(null); startCamera(); }} style={{ ...secondaryBtnStyle, flex: 1, padding: "14px", fontSize: "14px" }}>🔄 撮り直し</button>
              <button onClick={confirmPhoto} style={{ ...primaryBtnStyle, flex: 1, padding: "14px", fontSize: "14px", background: "#27AE60" }}>✓ 確定</button>
            </div>
          </div>
        ) : cameraActive ? (
          <div style={{ width: "100%", maxWidth: "500px", position: "relative" }}>
            {/* Sample zoom overlay */}
            {sampleZoom && current?.sampleImageUrl && (
              <div onClick={() => setSampleZoom(false)} style={{ position: "fixed", inset: 0, zIndex: 9998, background: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
                <div style={{ position: "relative", maxWidth: "100%", maxHeight: "100%" }}>
                  <img src={current.sampleImageUrl} alt="sample" style={{ maxWidth: "100%", maxHeight: "85vh", objectFit: "contain", borderRadius: "8px" }} />
                  <div style={{ position: "absolute", top: "8px", left: "8px", background: "#9B59B6", color: "#fff", padding: "4px 12px", borderRadius: "6px", fontSize: "13px", fontWeight: 700 }}>📷 見本</div>
                  <div style={{ textAlign: "center", marginTop: "12px", color: "#fff", fontSize: "13px" }}>タップで閉じる</div>
                </div>
              </div>
            )}
            <div style={{ borderRadius: "12px", overflow: "hidden", border: "2px solid var(--accent)", position: "relative", marginBottom: "16px" }}>
              <video ref={videoRef} autoPlay={true} playsInline={true} muted={true} style={{ width: "100%", display: "block", background: "#000" }} />
              <div style={{ position: "absolute", top: "8px", left: "8px", background: `${catInfo.color}CC`, color: "#fff", padding: "4px 10px", borderRadius: "6px", fontSize: "12px", fontWeight: 700, backdropFilter: "blur(4px)", pointerEvents: "none" }}>{catInfo.icon} {current?.name}</div>
              {/* Floating sample thumbnail */}
              {current?.sampleImageUrl && (
                <div onClick={() => setSampleZoom(true)} style={{ position: "absolute", bottom: "8px", right: "8px", width: "80px", height: "80px", borderRadius: "10px", overflow: "hidden", border: "2px solid #9B59B6", cursor: "pointer", boxShadow: "0 2px 12px rgba(0,0,0,0.5)" }}>
                  <img src={current.sampleImageUrl} alt="s" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "#9B59B6", color: "#fff", fontSize: "8px", textAlign: "center", fontWeight: 700, lineHeight: "14px" }}>見本</div>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: "10px", alignItems: "center", justifyContent: "center" }}>
              <button onClick={stopCamera} style={{ ...secondaryBtnStyle, padding: "12px 20px" }}>キャンセル</button>
              <button onClick={capturePhoto} style={{ width: "68px", height: "68px", borderRadius: "50%", border: "4px solid var(--accent)", background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ width: "52px", height: "52px", borderRadius: "50%", background: "var(--accent)" }} />
              </button>
              <div style={{ width: "80px" }} />
            </div>
          </div>
        ) : current?.status === "done" && current?.photoDataUrl ? (
          <div style={{ width: "100%", maxWidth: "500px", textAlign: "center" }}>
            <div style={{ borderRadius: "16px", overflow: "hidden", border: "2px solid #27AE6044", marginBottom: "16px", position: "relative" }}>
              <img src={current.photoDataUrl} alt="" style={{ width: "100%", display: "block" }} />
              <div style={{ position: "absolute", top: "12px", right: "12px", background: "#27AE60", color: "#fff", padding: "4px 10px", borderRadius: "6px", fontSize: "12px", fontWeight: 700 }}>✓ 撮影済</div>
            </div>
            <button onClick={startCamera} style={{ ...secondaryBtnStyle, padding: "12px 24px", fontSize: "13px" }}>🔄 撮り直す</button>
          </div>
        ) : (
          <div style={{ textAlign: "center" }}>
            {current?.sampleImageUrl ? (
              <div style={{ marginBottom: "16px", position: "relative", display: "inline-block", maxWidth: "280px" }}>
                <div style={{ borderRadius: "14px", overflow: "hidden", border: "2px solid #9B59B6" }}><img src={current.sampleImageUrl} alt="s" style={{ width: "100%", display: "block" }} /></div>
                <div style={{ position: "absolute", top: "8px", left: "8px", background: "#9B59B6", color: "#fff", padding: "3px 10px", borderRadius: "6px", fontSize: "11px", fontWeight: 700 }}>📷 見本</div>
              </div>
            ) : (
              <div style={{ width: "100px", height: "100px", borderRadius: "50%", background: `${catInfo.color}15`, border: `3px dashed ${catInfo.color}44`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: "36px" }}>📷</div>
            )}
            <p style={{ color: "var(--t2)", fontSize: "14px", fontWeight: 600, marginBottom: "4px" }}>{current?.name}</p>
            <p style={{ color: "var(--t3)", fontSize: "12px", marginBottom: "16px" }}>カメラを起動して撮影</p>
            <button onClick={startCamera} style={{ ...primaryBtnStyle, padding: "14px 32px", fontSize: "15px" }}>📸 カメラ起動</button>
          </div>
        )}
      </div>

      <div style={{ padding: "12px 20px", borderTop: "1px solid var(--bdr)", background: "var(--card)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button onClick={() => setCurrentIndex(Math.max(0, currentIndex - 1))} disabled={currentIndex === 0} style={{ ...secondaryBtnStyle, padding: "10px 16px", opacity: currentIndex === 0 ? 0.3 : 1 }}>← 前へ</button>
        <span style={{ fontSize: "12px", fontWeight: 700, color: "var(--t3)" }}>{currentIndex + 1} / {total}</span>
        <button onClick={() => setCurrentIndex(Math.min(total - 1, currentIndex + 1))} disabled={currentIndex === total - 1} style={{ ...secondaryBtnStyle, padding: "10px 16px", opacity: currentIndex === total - 1 ? 0.3 : 1 }}>次へ →</button>
      </div>
    </Shell>
  );
}

/* ══════════════════════════════════════════

/* Supabase-backed Auth Store */
function useAuthStore() {
  const [users, setUsers] = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      const u = await db.getUsers();
      setUsers(u);
      const savedId = sessionStorage.getItem('shoot_session');
      if (savedId) {
        const found = u.find(x => x.id === savedId);
        if (found) setCurrentUser(found);
      }
      setLoaded(true);
    })();
  }, []);

  const refreshUsers = async () => { const u = await db.getUsers(); setUsers(u); };

  const login = (username, password) => {
    const user = users.find((u) => u.username === username && u.password === password);
    if (user) { setCurrentUser(user); sessionStorage.setItem('shoot_session', user.id); return { success: true }; }
    return { success: false, error: "ユーザー名またはパスワードが違います" };
  };
  const logout = () => { setCurrentUser(null); sessionStorage.removeItem('shoot_session'); };
  const addUser = async (userData) => {
    if (users.find((u) => u.username === userData.username)) return { success: false, error: "このユーザー名は既に使用されています" };
    const newUser = { id: Math.random().toString(36).substr(2, 9), ...userData, createdAt: new Date().toISOString() };
    const ok = await db.addUser(newUser);
    if (ok) { await refreshUsers(); return { success: true, user: newUser }; }
    return { success: false, error: "登録に失敗しました" };
  };
  const updateUser = async (id, updates) => {
    await db.updateUser(id, updates);
    await refreshUsers();
    if (currentUser?.id === id) setCurrentUser((prev) => ({ ...prev, ...updates }));
  };
  const deleteUser = async (id) => {
    if (id === "admin") return { success: false, error: "デフォルト管理者は削除できません" };
    await db.deleteUser(id);
    await refreshUsers();
    return { success: true };
  };
  const isAdmin = currentUser?.role === "admin";
  return { users, currentUser, login, logout, addUser, updateUser, deleteUser, isAdmin, loaded };
}

/* Supabase-backed Main App */
function PersistentApp() {
  const auth = useAuthStore();
  const [mode, setMode] = useState("login");
  const [flows, setFlows] = useState([]);
  const [flowsLoaded, setFlowsLoaded] = useState(false);
  const [activeFlowId, setActiveFlowId] = useState(null);
  const [toast, setToast] = useState(null);
  const activeFlow = flows.find((f) => f.id === activeFlowId);
  const showToast = (msg, type = "success") => setToast({ message: msg, type, key: Date.now() });

  useEffect(() => {
    if (auth.loaded) {
      db.getFlows().then(f => { setFlows(f); setFlowsLoaded(true); });
    }
  }, [auth.loaded]);

  useEffect(() => {
    if (auth.currentUser && mode === "login") setMode("home");
  }, [auth.currentUser]);

  useEffect(() => {
    if (auth.loaded && flowsLoaded) {
      setTimeout(() => document.getElementById('splash')?.classList.add('hide'), 300);
    }
  }, [auth.loaded, flowsLoaded]);

  const createFlow = async (name, presetKey) => {
    const preset = PROPERTY_PRESETS[presetKey];
    const uid = () => Math.random().toString(36).substr(2, 9);
    const nf = { id: uid(), name, propertyType: presetKey, createdAt: new Date().toISOString(), createdBy: auth.currentUser?.displayName || "",
      points: preset.points.map((p) => ({ id: uid(), ...p, status: "pending", photoDataUrl: null, sampleImageUrl: null, note: "", timestamp: null, shotBy: "" })) };
    await db.saveFlow(nf);
    setFlows(await db.getFlows());
    setActiveFlowId(nf.id); setMode("admin");
  };
  const updateFlow = async (u) => {
    await db.saveFlow(u);
    setFlows(await db.getFlows());
  };
  const deleteFlow = async (id) => {
    await db.deleteFlow(id);
    setFlows(await db.getFlows());
    if (activeFlowId === id) { setActiveFlowId(null); setMode("home"); }
  };
  const handleLogout = () => { auth.logout(); setMode("login"); };

  if (!auth.loaded || !flowsLoaded) return null;
  if (!auth.currentUser) return <><LoginScreen auth={auth} onSuccess={() => setMode("home")} />{toast && <Toast {...toast} onDone={() => setToast(null)} />}</>;

  const content = (() => {
    if (mode === "settings") return <SettingsScreen auth={auth} onBack={() => setMode("home")} onLogout={handleLogout} showToast={showToast} onNavigateUsers={() => setMode("users")} />;
    if (mode === "users" && auth.isAdmin) return <UserManagement auth={auth} onBack={() => setMode("settings")} showToast={showToast} />;
    if (mode === "shoot" && activeFlow) return <ShootMode flow={activeFlow} onUpdate={updateFlow} onBack={() => setMode("admin")} showToast={showToast} currentUser={auth.currentUser} />;
    if (mode === "admin" && activeFlow) return <AdminMode flow={activeFlow} onUpdate={updateFlow} onStartShoot={() => setMode("shoot")} onBack={() => { setActiveFlowId(null); setMode("home"); }} onDelete={() => deleteFlow(activeFlow.id)} showToast={showToast} isAdmin={auth.isAdmin} />;
    return <HomeScreen flows={flows} onCreateFlow={createFlow} onSelectFlow={(id) => { setActiveFlowId(id); setMode("admin"); }} auth={auth} onSettings={() => setMode("settings")} />;
  })();

  return <>{content}{toast && <Toast {...toast} onDone={() => setToast(null)} />}</>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<PersistentApp />);

</script>
